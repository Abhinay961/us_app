<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ letter.title }}</title>
    <style>
        body {
            font-family: "Georgia", serif;
            color: #111;
            background: #fff;
            padding: 40px;
            line-height: 1.8;
        }
        h1 {
            text-align: center;
            font-size: 24pt;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-weight: normal;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            font-style: italic;
            color: #555;
            margin-bottom: 40px;
            font-size: 12pt;
        }
        .meta-right {
            float: right;
        }
        .content {
            font-size: 14pt;
            white-space: pre-wrap;
        }
        .signature {
            margin-top: 60px;
            text-align: right;
            font-style: italic;
            font-size: 14pt;
        }
        .signature strong {
            display: block;
            margin-top: 10px;
            font-size: 16pt;
        }
    </style>
</head>
<body>
    <h1>{{ letter.title }}</h1>
    <div class="meta">
        <span>Date: {{ letter.created_at.strftime('%B %d, %Y') }}</span>
        <span class="meta-right">From: {{ letter.author.username }}</span>
    </div>
    <div class="content">{{ letter.content }}</div>
    <div class="signature">
        Yours,<br>
        <strong>{{ letter.author.username }}</strong>
    </div>
</body>
</html>
